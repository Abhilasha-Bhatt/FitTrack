<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack - Input Form</title>
    <style>
        :root {
            --brand: #1f9d55;
            --brand-dark: #157a43;
            --brand-light: #34d399;
            --panel: rgba(255, 255, 255, 0.92);
            --text: #1c1c1c;
            --muted: rgba(28, 28, 28, 0.65);
            --border: rgba(31, 31, 31, 0.12);
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(-45deg, #1a535c, #1f9d55, #34d399, #ade8f4);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
            margin: 0;
            padding: 0;
            padding-top: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
        }

        @keyframes gradientMove {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .page-header {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 18px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.18);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .page-header .logo img {
            width: 42px;
            height: 42px;
            object-fit: contain;
        }

        .page-header h1 {
            margin: 0;
            font-size: 1.6rem;
            color: #fff;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.25);
        }

        .page-header .tagline {
            margin: 0;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 0.4px;
        }

        .container {
            background: var(--panel);
            border-radius: 16px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
            padding: 40px;
            max-width: 640px;
            width: 100%;
            margin: 20px;
            border: 1px solid var(--border);
        }

        h2 {
            color: var(--brand-dark);
            margin-bottom: 20px;
            font-size: 24px;
            border-bottom: 2px solid var(--brand);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: var(--muted);
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.9);
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 4px rgba(31, 157, 85, 0.15);
        }

        .radio-group,
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .radio-group label,
        .checkbox-group label {
            display: flex;
            align-items: center;
            margin-bottom: 0;
            font-weight: normal;
            color: var(--muted);
            padding: 8px 12px;
            border-radius: 10px;
            background: rgba(34, 51, 59, 0.08);
            border: 1px solid rgba(34, 51, 59, 0.06);
            transition: background 0.2s ease;
        }

        .radio-group label:hover,
        .checkbox-group label:hover {
            background: rgba(34, 51, 59, 0.12);
        }

        input[type="radio"],
        input[type="checkbox"] {
            margin-right: 10px;
            transform: scale(1.2);
        }

        button {
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(31, 157, 85, 0.35);
        }

        button:active {
            transform: translateY(0);
        }

        .success-message {
            display: none;
            background: rgba(41, 141, 75, 0.18);
            color: #1b4621;
            padding: 15px;
            border-radius: 10px;
            margin-top: 22px;
            border: 1px solid rgba(31, 157, 85, 0.25);
        }

        .error-message {
            color: #b42222;
            font-size: 14px;
            margin-top: 5px;
        }

        fieldset {
            border: 2px solid var(--brand);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.95);
        }

        legend {
            font-size: 18px;
            font-weight: bold;
            color: var(--brand-dark);
            padding: 0 10px;
            background: var(--panel);
            border-radius: 8px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 24px;
            }
            h2 {
                font-size: 20px;
            }

            .page-header {
                flex-direction: column;
                text-align: center;
                gap: 8px;
                top: 14px;
                padding: 12px 18px;
                left: 50%;
                transform: translateX(-50%);
            }

            .page-header h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <header class="page-header">
        <div class="logo">
            <img src="../icons8-apple-fitness-50.png" alt="FitTrack logo" />
        </div>
        <div class="brand">
            <h1>FitTrack</h1>
            <p class="tagline">Healthy living, rich life</p>
        </div>
    </header>

    <div class="container">
        <form id="fittrackForm">
            <fieldset>
                <legend>Personal Information</legend>

                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                    <div class="error-message" id="nameError"></div>
                </div>

                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" required min="1" max="120">
                    <div class="error-message" id="ageError"></div>
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="male" required> Male</label>
                        <label><input type="radio" name="gender" value="female"> Female</label>
                        <label><input type="radio" name="gender" value="other"> Other</label>
                    </div>
                    <div class="error-message" id="genderError"></div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Body Metrics</legend>

                <div class="form-group">
                    <label for="height">Height (cm)</label>
                    <input type="number" id="height" name="height" min="50" max="250">
                </div>

                <div class="form-group">
                    <label for="weight">Weight (kg)</label>
                    <input type="number" id="weight" name="weight" min="20" max="300">
                </div>
            </fieldset>

            <fieldset>
                <legend>Health Conditions</legend>

                <div class="form-group">
                    <div class="checkbox-group">
                        <label><input type="checkbox" name="diabetes"> Diabetes</label>
                        <label><input type="checkbox" name="bp"> High Blood Pressure</label>
                        <label><input type="checkbox" name="cholesterol"> High Cholesterol</label>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Exercise Preference</legend>

                <div class="form-group">
                    <select id="exercise" name="exercise">
                        <option value="">Select an exercise</option>
                        <option value="yoga">Yoga</option>
                        <option value="gym">Gym</option>
                        <option value="calisthenics">Calisthenics</option>
                        <option value="running">Running</option>
                    </select>
                </div>
            </fieldset>

            <button type="submit">Generate Plan</button>
        </form>
        <div class="success-message" id="successMessage">
            Thank you! Your fitness plan is being generated based on your inputs.
        </div>
    </div>

    <script>
        document.getElementById('fittrackForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Clear previous errors
            document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
            
            let isValid = true;
            
            // Validate name
            const name = document.getElementById('name').value.trim();
            if (name === '') {
                document.getElementById('nameError').textContent = 'Name is required.';
                isValid = false;
            }
            
            // Validate age
            const age = document.getElementById('age').value;
            if (age === '' || age < 1 || age > 120) {
                document.getElementById('ageError').textContent = 'Please enter a valid age (1-120).';
                isValid = false;
            }
            
            // Validate gender
            const gender = document.querySelector('input[name="gender"]:checked');
            if (!gender) {
                document.getElementById('genderError').textContent = 'Please select a gender.';
                isValid = false;
            }
            
            if (isValid) {
                // Show success message
                document.getElementById('successMessage').style.display = 'block';
                
                // Here you could send the data to a server or process it further
                console.log('Form submitted:', {
                    name: name,
                    age: age,
                    gender: gender.value,
                    height: document.getElementById('height').value,
                    weight: document.getElementById('weight').value,
                    diabetes: document.querySelector('input[name="diabetes"]').checked,
                    bp: document.querySelector('input[name="bp"]').checked,
                    cholesterol: document.querySelector('input[name="cholesterol"]').checked,
                    exercise: document.getElementById('exercise').value
                });
                
                // Reset form after 3 seconds
                setTimeout(() => {
                    this.reset();
                    document.getElementById('successMessage').style.display = 'none';
                }, 3000);
            }
        });
    </script>
</body>
</html>
